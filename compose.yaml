services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on: [db, redis]
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: [taskdata:/var/lib/postgresql]
  redis:
    image: redis:8.8-alpine
    ports: ["6379:6379"]

volumes:
  taskdata: