services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on: [db]
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: [taskdata:/var/lib/postgresql]

volumes:
  taskdata: